name: Docker 이미지 build 및 push & ECS service 업데이트

on:  # 워크플로우 실행 조건(트리거 이벤트) 정의
  push:  # push 이벤트 발생 시 실행
    branches: [ "release" ]  # release 브랜치에 push될 때만 실행

jobs:  # 실행할 작업(job)들을 정의
  # Docker 이미지 build 및 push Job
  docker-image-build-and-push:  # job 이름
    runs-on: ubuntu-latest  # 실행 환경 설정(docker-image-build-and-push job이 이 환경에서 실행됨)

    # job의 결과(output)를 다른 job에서 사용할 수 있게 설정
    outputs:
      image_tag: ${{ steps.prep.outputs.image_tag }}

    # 작업(job)에서 자동으로 발급되는 `GITHUB_TOKEN`의 권한 범위를 제한하는 설정
    permissions:
      contents: read  # 읽기만 가능

    steps:  # job 안에서 실행될 단계
      # 1) 현재 repo의 소스코드를 checkout(가저옴)
      - name: Checkout
        uses: actions/checkout@v5

      # 2) JDK 설정
      - name: JDK 17 설정
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3) Gradle 캐시
      # GitHub Actions가 Gradle build를 더 빠르게 하도록 Gradle 관련 캐시를 설정
      # 매번 CI/CD 실행 시 의존성이나 Gradle 관련 상태를 처음부터 다시 받지 않도록,
      # 이전에 내려받은 것들을 저장했다가 다음 실행에서 재사용
      - name: Gradle 캐시
        uses: gradle/actions/setup-gradle@v5

      # 4) Gradle 실행 권한 설정
      # `chmod` : 파일의 권한을 변경하는 리눅스 명령어
      # `+x` : `chmod` 와 함께 쓰이며, 실행 권한을 추가하는 명령어
      - name: 실행 권한 부여
        run: chmod +x gradlew

      # 5) 애플리케이션 build (`JAR` 파일 생성)
      - name: build JAR
        run: ./gradlew clean bootjar  # 또는 ./gradlew clean build

      # 6) AWS CLI 설정 (Secrets 사용)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      # 7) Public ECR 로그인
      - name: ECR 로그인
        run: |
          aws ecr-public get-login-password --region us-east-1 \
          | docker login --username AWS --password-stdin public.ecr.aws

      # 8) Docker 이미지 tag 구성 (커밋 해시)
      # `id` : 이름표를 붙여서 나중에 참조할 때 사용
      # `echo ... >> "GITHUB_OUTPUT"` : 현재 step에서 만든 값(step output)을 다른 step이나 job에서 참조할 수 있게 저장하는 코드
      - name: Prepare tags
        id: prep
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV" 
          echo "REPO_URI=${{ vars.ECR_REPOSITORY_URI }}" >> "$GITHUB_ENV"
          echo "image_tag=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      # 9) Docker build (앞 단계("5)")에서 만든 `JAR`을 이미지에 복사)
      # tag = 커밋 해시 7자리 + latest
      - name: Docker build
        run: |
          docker build \
          -t "$REPO_URI:$IMAGE_TAG" \
          -t "$REPO_URI:latest" \
          .

      # 10) ECR push
      - name: Docker push
        run: |
            docker push "$REPO_URI:$IMAGE_TAG"
            docker push "$REPO_URI:latest"

  # ECS service에서 새 이미지 업데이트
  ecs-service-update:  # job 이름
    runs-on: ubuntu-latest  # 실행 환경 설정(ecs-service-update job이 이 환경에서 실행됨)
    needs: docker-image-build-and-push  # 앞의 이미지 build/push job이 끝난 뒤 실행

    permissions: # 작업(job)에서 자동으로 발급되는 `GITHUB_TOKEN`의 권한 범위를 제한하는 설정
      contents: read  # 읽기만 가능

    steps: # job 안에서 실행될 단계
      # 1) AWS CLI 설정 (Secrets 사용)
      # region은 ECS 클러스터가 있는 region
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      # 2) 현재 ECS 태스크 정의를 JSON 파일로 다운로드
      # `--task-definition` : 조회할 태스크 정의 이름(family) 또는 ARN 지정
      # `--query taskDefinition` : 응답 전체 중 `taskDefinition` 부분만 꺼냄
      # `> task-definition.json` : 조회 결과를 `task-definition.json` 파일에 저장
      - name: 현재 태스크 정의 다운로드
        run: |
          aws ecs describe-task-definition \
          --task-definition ${{ vars.ECS_TASK_DEFINITION }} \
          --query taskDefinition > task-definition.json

      # 3) 사용할 image tag 존재 확인
      - name: image tag 확인
        run: |
          echo "IMAGE TAG = [${{ needs.docker-image-build-and-push.outputs.image_tag }}]"

      # 4) 위에서 다운로드한 태스크 정의 JSON에서 컨테이너 이미지 URI만 새 이미지로 교체
      # `task-definition` : 수정할 원본 태스크 정의 파일
      # `container-name` : 이미지 값을 바꿀 컨테이너 이름(태스크 정의 안에 들어있는 실제 컨테이너 이름)
      # `image` : 새로 배포할 이미지 URI
      - name: 태스크 정의에 새 이미지 반영
        id: task-definition
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: discodeit-app
          image: ${{ vars.ECR_REPOSITORY_URI }}:${{ needs.docker-image-build-and-push.outputs.image_tag }}

      # 5) 기존애 구동 중인 ECS 서비스를 중단
      # `--desired-count` : 서비스가 유지하려고 하는 태스크 개수
      # `--desired-count 0`이면 실행 중인 태스크 수를 0개로 맞춤 (모두 중지)
      - name: 기존 ECS 서비스 중지
        run: |
          aws ecs update-service \
          --cluster ${{ vars.ECS_CLUSTER }} \
          --service ${{ vars.ECS_SERVICE }} \
          --desired-count 0

      # 6) 새 이미지가 반영된 테스크 정의로 ECS 서비스 업데이트
      # `definition` : 위 step에서 새 이미지가 반영된 태스크 정의 파일
      # `wait-for-service-stability` : 배포 후 서비스가 안정 상태가 될 때까지 기다림
      - name: ECS 서비스 업데이트
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-definition.outputs.task-definition }}
          cluster: ${{ vars.ECS_CLUSTER }}
          service: ${{ vars.ECS_SERVICE }}
          wait-for-service-stability: true

      # 7) 컨테이너 다시 실행하여 CES 서비스 다시 실행
      - name: ECS 서비스 다시 시작
        run: |
          aws ecs update-service \
          --cluster ${{ vars.ECS_CLUSTER }} \
          --service ${{ vars.ECS_SERVICE }} \
          --desired-count 1