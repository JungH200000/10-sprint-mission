spring:
  application:
    name: discodeit
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jpa:
    hibernate:
      ddl-auto: none  # Entity를 보고 Table 자동 생성 여부 설정
    open-in-view: false
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

discodeit:
  storage: # 파일 저장소 관련 설정
    type: ${STORAGE_TYPE:local}
    local:
      root-path: ${STORAGE_LOCAL_ROOT_PATH:.discodeit/storage}
    s3:
      access-key: ${AWS_S3_ACCESS_KEY:}
      secret-key: ${AWS_S3_SECRET_KEY:}
      region: ${AWS_S3_REGION:}
      bucket: ${AWS_S3_BUCKET:}
      presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION:600}

logging:
  level:
    root: INFO # 전체 로그 레벨 설정

management:
  endpoints:
    web:
      exposure:
        include: 'health, info, metrics, loggers'
  info:
    env:
      enabled: true

info:
  app:
    name: "Discodeit"
    version: "1.7.0"
    java-version: "17"
    spring-boot-version: "3.5.0"
  datasource:
    url: ${spring.datasource.url}
    driver-class-name: ${spring.datasource.driver-class-name}
  jpa:
    ddl-auto: ${spring.jpa.hibernate.ddl-auto}
  storage:
    type: ${discodeit.storage.type}
#    path: ${discodeit.storage.local.root-path}
  multipart:
    max-file-size: ${spring.servlet.multipart.max-file-size}
    max-request-size: ${spring.servlet.multipart.max-request-size}
