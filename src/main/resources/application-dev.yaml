server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/discodeit
    username: discodeit_user
    password: discodeit1234
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true # 실행되는 sql문을 console에 출력
  sql:
    init:
      mode: always # 애플리케이션 실행 시 sql 스크립트 실행

logging:
  level:
    com.sprint.mission.discodeit: DEBUG # 애플리케이션 패키지에서 발생하는 로그
#    org.hibernate.SQL: DEBUG # 실행되는 sql 로그
#    org.hibernate.orm.jdbc.bind: TRACE # 바인딩되는 파라미터 로그
#    org.hibernate.orm.jdbc.extract: TRACE # 조회 결과 추출 로그
#    org.springframework.transaction.interceptor: TRACE # 트랜잭션 인터셉터 로그
#    org.springframework.transaction.support: TRACE # 트랜잭션 처리 상세 로그
#    org.springframework.orm.jpa: TRACE # Spring ORM/JPA 상세 로그

management:
  endpoint:
    health:
      show-details: always # health 세부 정보 출력 여부